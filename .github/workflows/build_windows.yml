name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Add Windows platform
        run: flutter create --platforms=windows . --project-name invobox_erp

      - name: Install dependencies
        run: flutter pub get

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Build Windows release
        run: flutter build windows --release --verbose

      - name: Zip the build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (!(Test-Path $src)) { $src = "build\windows\runner\Release" }
          Write-Host "Zipping from: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "invobox_erp_windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invobox_erp_windows_build
          path: invobox_erp_windows.zip
          retention-days: 7